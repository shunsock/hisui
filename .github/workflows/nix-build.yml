name: nix build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nix-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: nix build
        run: nix build .

      - name: smoke test
        run: |
          nix run . -- f2h --src "０１２" | grep -q "012"
          nix run . -- h2f --src "012" | grep -q "０１２"
